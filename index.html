<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>풍운지기 Prototype Redirect</title>
  <meta http-equiv="refresh" content="0; url=./prototypes/tower-placement/">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(120, 176, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #09111c, #060912 60%, #0f1c18);
      color: #f3e4bf;
      font-family: "Noto Sans KR", sans-serif;
    }
    .shell {
      width: min(460px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(255, 235, 194, 0.14);
      background: rgba(9, 14, 24, 0.74);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
      backdrop-filter: blur(14px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: #d2d8e4;
      line-height: 1.6;
    }
    a {
      color: #ffe4a3;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>풍운지기 Prototype</h1>
    <p>프로토타입 페이지로 이동합니다.</p>
    <p><a href="./prototypes/tower-placement/">이동이 안 되면 여기를 눌러주세요.</a></p>
  </div>
</body>
</html>
